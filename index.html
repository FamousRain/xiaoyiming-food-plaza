<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>小奕铭美食广场</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fff6d9;
      --paper: #fffdf7;
      --ink: #33231c;
      --muted: #7b6258;
      --line: #f0cdb4;
      --accent: #ff6b6b;
      --accent-strong: #e94e55;
      --mint: #3dbf8f;
      --lemon: #ffd457;
      --blue: #52a7df;
      --pink: #ff92bd;
      --shadow: 0 18px 42px rgba(177, 88, 50, 0.16);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 14% 12%, rgba(255, 146, 189, 0.32) 0 110px, transparent 112px),
        radial-gradient(circle at 86% 8%, rgba(82, 167, 223, 0.28) 0 95px, transparent 98px),
        radial-gradient(circle at 76% 88%, rgba(61, 191, 143, 0.24) 0 120px, transparent 123px),
        linear-gradient(135deg, #fff8de 0%, #ffe8ea 48%, #e8f8ff 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.35;
      background-image:
        radial-gradient(circle, rgba(255, 107, 107, 0.55) 0 3px, transparent 4px),
        radial-gradient(circle, rgba(255, 212, 87, 0.65) 0 3px, transparent 4px),
        radial-gradient(circle, rgba(61, 191, 143, 0.55) 0 2px, transparent 3px);
      background-position: 30px 42px, 120px 86px, 74px 144px;
      background-size: 180px 180px, 210px 210px, 160px 160px;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      position: relative;
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 30px 0 46px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      border: 3px solid #fff7d6;
      border-radius: 18px;
      color: #fffdf7;
      background: linear-gradient(135deg, var(--accent), var(--pink));
      box-shadow: 0 14px 26px rgba(255, 107, 107, 0.32);
      transform: rotate(-5deg);
    }

    .mark svg {
      width: 32px;
      height: 32px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 48px);
      line-height: 1.06;
      letter-spacing: 0;
      text-shadow: 0 3px 0 rgba(255, 255, 255, 0.75);
    }

    .tagline {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(82px, 1fr));
      gap: 10px;
      min-width: min(360px, 100%);
    }

    .stat {
      padding: 13px 14px;
      border: 2px solid rgba(255, 255, 255, 0.86);
      border-radius: 16px;
      background: rgba(255, 253, 247, 0.86);
      box-shadow: 0 10px 20px rgba(177, 88, 50, 0.1);
    }

    .stat strong {
      display: block;
      color: var(--accent-strong);
      font-size: 25px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel,
    .list-panel {
      border: 2px solid rgba(255, 255, 255, 0.9);
      border-radius: 18px;
      background: rgba(255, 253, 247, 0.92);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .panel {
      padding: 18px;
      position: sticky;
      top: 18px;
    }

    .panel h2,
    .list-panel h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-title h2::before {
      content: "✦";
      margin-right: 7px;
      color: var(--accent);
    }

    .field {
      display: grid;
      gap: 7px;
      margin-bottom: 13px;
    }

    label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 2px solid #f2cfbd;
      border-radius: 14px;
      background: #fffefa;
      color: var(--ink);
      outline: none;
      padding: 11px 12px;
      transition: border-color 0.16s, box-shadow 0.16s, transform 0.16s;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: rgba(255, 107, 107, 0.9);
      box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.16);
      transform: translateY(-1px);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      border-radius: 14px;
      padding: 0 15px;
      color: #fffdf7;
      background: linear-gradient(135deg, var(--accent), var(--pink));
      font-weight: 800;
      box-shadow: 0 10px 18px rgba(255, 107, 107, 0.25);
      transition: transform 0.15s, filter 0.15s, opacity 0.15s;
    }

    .btn:hover {
      filter: saturate(1.08) brightness(0.98);
      transform: translateY(-2px) rotate(-0.4deg);
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }

    .btn svg,
    .icon-btn svg,
    .tiny svg {
      width: 17px;
      height: 17px;
      stroke-width: 2.4;
    }

    .btn.full {
      width: 100%;
    }

    .tabs {
      display: inline-grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 5px;
      padding: 5px;
      border: 2px solid #f4d1be;
      border-radius: 16px;
      background: #fff2c8;
    }

    .tab {
      min-width: 92px;
      min-height: 36px;
      border-radius: 12px;
      color: var(--muted);
      background: transparent;
      font-weight: 800;
    }

    .tab.active {
      color: var(--ink);
      background: #fffdf7;
      box-shadow: 0 7px 14px rgba(177, 88, 50, 0.13);
    }

    .list-panel {
      overflow: hidden;
    }

    .list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px;
      border-bottom: 2px dashed #f3c9b3;
    }

    .search {
      max-width: 270px;
    }

    .items {
      display: grid;
      gap: 12px;
      padding: 18px;
    }

    .food-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      padding: 16px;
      border: 2px solid #f3d0bd;
      border-left: 8px solid var(--accent);
      border-radius: 18px;
      background: #fffefa;
      box-shadow: 0 8px 18px rgba(177, 88, 50, 0.08);
    }

    .food-card.eaten {
      border-left-color: var(--mint);
    }

    .food-main {
      min-width: 0;
    }

    .food-title {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
    }

    .food-title h3 {
      margin: 0;
      overflow-wrap: anywhere;
      font-size: 18px;
      line-height: 1.25;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 25px;
      border-radius: 999px;
      padding: 0 10px;
      color: #fffdf7;
      background: var(--blue);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .chip.eaten {
      background: var(--mint);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .note {
      margin: 10px 0 0;
      color: #5a433b;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .actions {
      display: flex;
      align-items: start;
      gap: 8px;
    }

    .icon-btn,
    .tiny {
      display: inline-grid;
      place-items: center;
      width: 39px;
      height: 39px;
      border: 2px solid #f3d0bd;
      border-radius: 13px;
      color: var(--ink);
      background: #fff5d7;
      transition: background 0.15s, transform 0.15s;
    }

    .icon-btn:hover,
    .tiny:hover {
      background: #ffe2ef;
      transform: translateY(-2px) rotate(2deg);
    }

    .eat-form {
      display: none;
      grid-column: 1 / -1;
      grid-template-columns: repeat(2, minmax(120px, 1fr)) auto;
      gap: 10px;
      padding-top: 12px;
      border-top: 2px dashed #f3c9b3;
    }

    .food-card.open .eat-form {
      display: grid;
    }

    .rating {
      color: #d78b00;
      font-weight: 900;
      letter-spacing: 0;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 280px;
      color: var(--muted);
      text-align: center;
      border: 2px dashed #f3c9b3;
      border-radius: 18px;
      background: linear-gradient(135deg, #fff9dd, #fff2f7);
    }

    .empty svg {
      width: 58px;
      height: 58px;
      margin-bottom: 12px;
      color: var(--accent);
    }

    .empty strong {
      display: block;
      margin-bottom: 6px;
      color: var(--ink);
      font-size: 18px;
    }

    @media (max-width: 820px) {
      .topbar,
      .layout,
      .list-head {
        grid-template-columns: 1fr;
        flex-direction: column;
        align-items: stretch;
      }

      .panel {
        position: static;
      }

      .search {
        max-width: none;
      }

      .stats {
        min-width: 0;
      }
    }

    @media (max-width: 560px) {
      .app {
        width: min(100% - 20px, 1180px);
        padding-top: 16px;
      }

      .brand {
        align-items: flex-start;
      }

      .mark {
        width: 50px;
        height: 50px;
        border-radius: 16px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .food-card {
        grid-template-columns: 1fr;
      }

      .actions {
        justify-content: flex-start;
      }

      .eat-form {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M7 3v8"></path>
            <path d="M10 3v8"></path>
            <path d="M7 11c0 2 3 2 3 0"></path>
            <path d="M8.5 11v10"></path>
            <path d="M17 3c-1.6 1.8-2.4 4-2.4 6.6V14h4.8V3"></path>
            <path d="M17 14v7"></path>
          </svg>
        </div>
        <div>
          <h1>小奕铭美食广场</h1>
          <p class="tagline">把想吃的小愿望排好队，吃到开心就给它打个分。</p>
        </div>
      </div>
      <div class="stats" aria-label="清单统计">
        <div class="stat">
          <strong id="todoCount">0</strong>
          <span>待吃</span>
        </div>
        <div class="stat">
          <strong id="eatenCount">0</strong>
          <span>已吃</span>
        </div>
        <div class="stat">
          <strong id="avgRating">-</strong>
          <span>平均评分</span>
        </div>
      </div>
    </header>

    <section class="layout">
      <aside class="panel">
        <div class="section-title">
          <h2>新增小吃摊</h2>
        </div>
        <form id="addForm">
          <div class="field">
            <label for="foodName">美食名称</label>
            <input id="foodName" name="foodName" autocomplete="off" maxlength="40" placeholder="例如：牛肉火锅" required>
          </div>
          <div class="field">
            <label for="foodPlace">店铺或地点</label>
            <input id="foodPlace" name="foodPlace" autocomplete="off" maxlength="50" placeholder="例如：公司附近">
          </div>
          <div class="field">
            <label for="foodNote">备注</label>
            <textarea id="foodNote" name="foodNote" maxlength="180" placeholder="口味、推荐菜、同行的人都可以写在这里"></textarea>
          </div>
          <button class="btn full" type="submit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M12 5v14"></path>
              <path d="M5 12h14"></path>
            </svg>
            加入美食广场
          </button>
        </form>
      </aside>

      <section class="list-panel">
        <div class="list-head">
          <div class="section-title">
            <h2 id="listTitle">待吃小摊</h2>
          </div>
          <div class="tabs" aria-label="切换清单">
            <button class="tab active" type="button" data-view="todo">待吃</button>
            <button class="tab" type="button" data-view="eaten">已吃</button>
          </div>
          <input class="search" id="searchInput" autocomplete="off" placeholder="搜索美食或地点">
        </div>
        <div class="items" id="items"></div>
      </section>
    </section>
  </main>

  <template id="emptyTemplate">
    <div class="empty">
      <div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M4 10h16"></path>
          <path d="M5 10l1.6 9h10.8L19 10"></path>
          <path d="M8 10c0-3 1.4-5 4-5s4 2 4 5"></path>
        </svg>
        <strong></strong>
        <span></span>
      </div>
    </div>
  </template>

  <script>
    const STORAGE_KEY = "toEatFoods.v1";
    const state = {
      view: "todo",
      search: "",
      foods: loadFoods()
    };

    const addForm = document.querySelector("#addForm");
    const items = document.querySelector("#items");
    const tabs = document.querySelectorAll(".tab");
    const listTitle = document.querySelector("#listTitle");
    const searchInput = document.querySelector("#searchInput");
    const todoCount = document.querySelector("#todoCount");
    const eatenCount = document.querySelector("#eatenCount");
    const avgRating = document.querySelector("#avgRating");

    addForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const formData = new FormData(addForm);
      const name = String(formData.get("foodName") || "").trim();

      if (!name) return;

      state.foods.unshift({
        id: crypto.randomUUID(),
        name,
        place: String(formData.get("foodPlace") || "").trim(),
        note: String(formData.get("foodNote") || "").trim(),
        status: "todo",
        createdAt: new Date().toISOString(),
        eatenDate: "",
        rating: ""
      });

      addForm.reset();
      saveFoods();
      render();
    });

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        state.view = tab.dataset.view;
        render();
      });
    });

    searchInput.addEventListener("input", () => {
      state.search = searchInput.value.trim().toLowerCase();
      renderItems();
    });

    items.addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (!button) return;

      const card = button.closest(".food-card");
      const food = state.foods.find((item) => item.id === card?.dataset.id);
      if (!food) return;

      if (button.dataset.action === "openEat") {
        card.classList.toggle("open");
      }

      if (button.dataset.action === "delete") {
        state.foods = state.foods.filter((item) => item.id !== food.id);
        saveFoods();
        render();
      }
    });

    items.addEventListener("submit", (event) => {
      event.preventDefault();
      const form = event.target;
      const card = form.closest(".food-card");
      const food = state.foods.find((item) => item.id === card?.dataset.id);
      if (!food) return;

      const formData = new FormData(form);
      food.status = "eaten";
      food.eatenDate = String(formData.get("eatenDate") || "");
      food.rating = Number(formData.get("rating") || 0);
      saveFoods();
      state.view = "eaten";
      render();
    });

    function loadFoods() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveFoods() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.foods));
    }

    function render() {
      tabs.forEach((tab) => {
        tab.classList.toggle("active", tab.dataset.view === state.view);
      });
      listTitle.textContent = state.view === "todo" ? "待吃小摊" : "已吃回忆";
      renderStats();
      renderItems();
    }

    function renderStats() {
      const todoFoods = state.foods.filter((food) => food.status === "todo");
      const eatenFoods = state.foods.filter((food) => food.status === "eaten");
      const ratings = eatenFoods.map((food) => Number(food.rating)).filter(Boolean);
      const average = ratings.length
        ? (ratings.reduce((sum, item) => sum + item, 0) / ratings.length).toFixed(1)
        : "-";

      todoCount.textContent = todoFoods.length;
      eatenCount.textContent = eatenFoods.length;
      avgRating.textContent = average;
    }

    function renderItems() {
      const filtered = state.foods
        .filter((food) => food.status === state.view)
        .filter((food) => {
          const target = `${food.name} ${food.place} ${food.note}`.toLowerCase();
          return target.includes(state.search);
        });

      items.innerHTML = "";

      if (!filtered.length) {
        items.appendChild(createEmpty());
        return;
      }

      filtered.forEach((food) => {
        items.appendChild(createFoodCard(food));
      });
    }

    function createFoodCard(food) {
      const card = document.createElement("article");
      card.className = `food-card ${food.status === "eaten" ? "eaten" : ""}`;
      card.dataset.id = food.id;

      const meta = [
        food.place ? `地点：${escapeHtml(food.place)}` : "",
        food.status === "eaten" && food.eatenDate ? `日期：${formatDate(food.eatenDate)}` : "",
        food.status === "eaten" && food.rating ? `评分：<span class="rating">${food.rating}/5</span>` : ""
      ].filter(Boolean).map((item) => `<span>${item}</span>`).join("");

      card.innerHTML = `
        <div class="food-main">
          <div class="food-title">
            <h3>${escapeHtml(food.name)}</h3>
            <span class="chip ${food.status === "eaten" ? "eaten" : ""}">${food.status === "eaten" ? "已吃" : "待吃"}</span>
          </div>
          <div class="meta">${meta || "还没有补充地点"}</div>
          ${food.note ? `<p class="note">${escapeHtml(food.note)}</p>` : ""}
        </div>
        <div class="actions">
          ${food.status === "todo" ? `
            <button class="icon-btn" type="button" data-action="openEat" title="标记为已吃" aria-label="标记为已吃">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M20 6 9 17l-5-5"></path>
              </svg>
            </button>
          ` : ""}
          <button class="icon-btn" type="button" data-action="delete" title="删除" aria-label="删除">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M3 6h18"></path>
              <path d="M8 6V4h8v2"></path>
              <path d="M19 6l-1 14H6L5 6"></path>
            </svg>
          </button>
        </div>
        ${food.status === "todo" ? createEatForm() : ""}
      `;

      const dateInput = card.querySelector('input[name="eatenDate"]');
      if (dateInput) dateInput.valueAsDate = new Date();

      return card;
    }

    function createEatForm() {
      return `
        <form class="eat-form">
          <div class="field">
            <label>吃过日期</label>
            <input type="date" name="eatenDate" required>
          </div>
          <div class="field">
            <label>评分</label>
            <select name="rating" required>
              <option value="5">5 分</option>
              <option value="4">4 分</option>
              <option value="3">3 分</option>
              <option value="2">2 分</option>
              <option value="1">1 分</option>
            </select>
          </div>
          <button class="btn" type="submit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M20 6 9 17l-5-5"></path>
            </svg>
            收进回忆
          </button>
        </form>
      `;
    }

    function createEmpty() {
      const template = document.querySelector("#emptyTemplate").content.cloneNode(true);
      const title = template.querySelector("strong");
      const text = template.querySelector("span");
      const searching = Boolean(state.search);

      title.textContent = searching
        ? "没有找到匹配项"
        : state.view === "todo" ? "美食广场还空着" : "还没有已吃回忆";
      text.textContent = searching
        ? "换个关键词试试。"
        : state.view === "todo" ? "从左侧添加一个想吃的小摊。" : "把待吃小摊标记为已吃后会出现在这里。";

      return template;
    }

    function formatDate(value) {
      if (!value) return "";
      const [year, month, day] = value.split("-");
      return `${year}.${month}.${day}`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    render();
  </script>
</body>
</html>
