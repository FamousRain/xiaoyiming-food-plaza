<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>小奕铭美食广场</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fff6d9;
      --paper: #fffdf7;
      --ink: #33231c;
      --muted: #7b6258;
      --line: #f0cdb4;
      --accent: #ff6b6b;
      --accent-strong: #e94e55;
      --mint: #3dbf8f;
      --lemon: #ffd457;
      --blue: #52a7df;
      --pink: #ff92bd;
      --shadow: 0 18px 42px rgba(177, 88, 50, 0.16);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 14% 12%, rgba(255, 146, 189, 0.32) 0 110px, transparent 112px),
        radial-gradient(circle at 86% 8%, rgba(82, 167, 223, 0.28) 0 95px, transparent 98px),
        radial-gradient(circle at 76% 88%, rgba(61, 191, 143, 0.24) 0 120px, transparent 123px),
        linear-gradient(135deg, #fff8de 0%, #ffe8ea 48%, #e8f8ff 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.35;
      background-image:
        radial-gradient(circle, rgba(255, 107, 107, 0.55) 0 3px, transparent 4px),
        radial-gradient(circle, rgba(255, 212, 87, 0.65) 0 3px, transparent 4px),
        radial-gradient(circle, rgba(61, 191, 143, 0.55) 0 2px, transparent 3px);
      background-position: 30px 42px, 120px 86px, 74px 144px;
      background-size: 180px 180px, 210px 210px, 160px 160px;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      position: relative;
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 30px 0 46px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .header-tools {
      display: grid;
      gap: 10px;
      min-width: min(360px, 100%);
    }

    .mark {
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      border: 3px solid #fff7d6;
      border-radius: 18px;
      color: #fffdf7;
      background: linear-gradient(135deg, var(--accent), var(--pink));
      box-shadow: 0 14px 26px rgba(255, 107, 107, 0.32);
      transform: rotate(-5deg);
    }

    .mark svg {
      width: 32px;
      height: 32px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 48px);
      line-height: 1.06;
      letter-spacing: 0;
      text-shadow: 0 3px 0 rgba(255, 255, 255, 0.75);
    }

    .tagline {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(82px, 1fr));
      gap: 10px;
    }

    .stat {
      padding: 13px 14px;
      border: 2px solid rgba(255, 255, 255, 0.86);
      border-radius: 16px;
      background: rgba(255, 253, 247, 0.86);
      box-shadow: 0 10px 20px rgba(177, 88, 50, 0.1);
    }

    .stat strong {
      display: block;
      color: var(--accent-strong);
      font-size: 25px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .panel,
    .list-panel {
      border: 2px solid rgba(255, 255, 255, 0.9);
      border-radius: 18px;
      background: rgba(255, 253, 247, 0.92);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .panel {
      padding: 18px;
      position: sticky;
      top: 18px;
    }

    .panel h2,
    .list-panel h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-title h2::before {
      content: "✦";
      margin-right: 7px;
      color: var(--accent);
    }

    .field {
      display: grid;
      gap: 7px;
      margin-bottom: 13px;
    }

    label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 2px solid #f2cfbd;
      border-radius: 14px;
      background: #fffefa;
      color: var(--ink);
      outline: none;
      padding: 11px 12px;
      transition: border-color 0.16s, box-shadow 0.16s, transform 0.16s;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: rgba(255, 107, 107, 0.9);
      box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.16);
      transform: translateY(-1px);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 44px;
      border-radius: 14px;
      padding: 0 15px;
      color: #fffdf7;
      background: linear-gradient(135deg, var(--accent), var(--pink));
      font-weight: 800;
      box-shadow: 0 10px 18px rgba(255, 107, 107, 0.25);
      transition: transform 0.15s, filter 0.15s, opacity 0.15s;
    }

    .btn:hover {
      filter: saturate(1.08) brightness(0.98);
      transform: translateY(-2px) rotate(-0.4deg);
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }

    .btn svg,
    .icon-btn svg,
    .tiny svg {
      width: 17px;
      height: 17px;
      stroke-width: 2.4;
    }

    .btn.full {
      width: 100%;
    }

    .sync-row {
      display: grid;
      gap: 7px;
    }

    .sync-status {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      min-height: 20px;
    }

    .sync-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--lemon);
      box-shadow: 0 0 0 4px rgba(255, 212, 87, 0.2);
    }

    .sync-dot.cloud {
      background: var(--mint);
      box-shadow: 0 0 0 4px rgba(61, 191, 143, 0.18);
    }

    .sync-dot.error {
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.18);
    }

    .ocr-box {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
      padding: 14px;
      border: 2px dashed #f3c9b3;
      border-radius: 16px;
      background: linear-gradient(135deg, #fff9dd, #fff3f8);
    }

    .ocr-box h3 {
      margin: 0;
      font-size: 16px;
      line-height: 1.25;
    }

    .ocr-actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 9px;
      align-items: center;
    }

    .file-picker {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      border: 2px solid #f2cfbd;
      border-radius: 14px;
      color: var(--ink);
      background: #fffefa;
      font-weight: 800;
      cursor: pointer;
    }

    .file-picker input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .ocr-preview {
      display: none;
      width: 100%;
      max-height: 210px;
      object-fit: contain;
      border: 2px solid #f2cfbd;
      border-radius: 14px;
      background: #fffefa;
    }

    .ocr-preview.show {
      display: block;
    }

    .ocr-status {
      min-height: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .tabs {
      display: inline-grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 5px;
      padding: 5px;
      border: 2px solid #f4d1be;
      border-radius: 16px;
      background: #fff2c8;
    }

    .tab {
      min-width: 92px;
      min-height: 36px;
      border-radius: 12px;
      color: var(--muted);
      background: transparent;
      font-weight: 800;
    }

    .tab.active {
      color: var(--ink);
      background: #fffdf7;
      box-shadow: 0 7px 14px rgba(177, 88, 50, 0.13);
    }

    .list-panel {
      overflow: hidden;
    }

    .list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px;
      border-bottom: 2px dashed #f3c9b3;
    }

    .search {
      max-width: 270px;
    }

    .items {
      display: grid;
      gap: 12px;
      padding: 18px;
    }

    .food-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      padding: 16px;
      border: 2px solid #f3d0bd;
      border-left: 8px solid var(--accent);
      border-radius: 18px;
      background: #fffefa;
      box-shadow: 0 8px 18px rgba(177, 88, 50, 0.08);
    }

    .food-card.eaten {
      border-left-color: var(--mint);
    }

    .food-main {
      min-width: 0;
    }

    .food-title {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
    }

    .food-title h3 {
      margin: 0;
      overflow-wrap: anywhere;
      font-size: 18px;
      line-height: 1.25;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 25px;
      border-radius: 999px;
      padding: 0 10px;
      color: #fffdf7;
      background: var(--blue);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .chip.eaten {
      background: var(--mint);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .note {
      margin: 10px 0 0;
      color: #5a433b;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .actions {
      display: flex;
      align-items: start;
      gap: 8px;
    }

    .icon-btn,
    .tiny {
      display: inline-grid;
      place-items: center;
      width: 39px;
      height: 39px;
      border: 2px solid #f3d0bd;
      border-radius: 13px;
      color: var(--ink);
      background: #fff5d7;
      transition: background 0.15s, transform 0.15s;
    }

    .icon-btn:hover,
    .tiny:hover {
      background: #ffe2ef;
      transform: translateY(-2px) rotate(2deg);
    }

    .eat-form {
      display: none;
      grid-column: 1 / -1;
      grid-template-columns: repeat(2, minmax(120px, 1fr)) auto;
      gap: 10px;
      padding-top: 12px;
      border-top: 2px dashed #f3c9b3;
    }

    .food-card.open .eat-form {
      display: grid;
    }

    .rating {
      color: #d78b00;
      font-weight: 900;
      letter-spacing: 0;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 280px;
      color: var(--muted);
      text-align: center;
      border: 2px dashed #f3c9b3;
      border-radius: 18px;
      background: linear-gradient(135deg, #fff9dd, #fff2f7);
    }

    .empty svg {
      width: 58px;
      height: 58px;
      margin-bottom: 12px;
      color: var(--accent);
    }

    .empty strong {
      display: block;
      margin-bottom: 6px;
      color: var(--ink);
      font-size: 18px;
    }

    @media (max-width: 820px) {
      .topbar,
      .layout,
      .list-head {
        grid-template-columns: 1fr;
        flex-direction: column;
        align-items: stretch;
      }

      .panel {
        position: static;
      }

      .search {
        max-width: none;
      }

      .stats {
        min-width: 0;
      }

      .sync-status {
        justify-content: flex-start;
      }
    }

    @media (max-width: 560px) {
      .app {
        width: min(100% - 20px, 1180px);
        padding-top: 16px;
      }

      .brand {
        align-items: flex-start;
      }

      .mark {
        width: 50px;
        height: 50px;
        border-radius: 16px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .food-card {
        grid-template-columns: 1fr;
      }

      .actions {
        justify-content: flex-start;
      }

      .eat-form {
        grid-template-columns: 1fr;
      }

      .ocr-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M7 3v8"></path>
            <path d="M10 3v8"></path>
            <path d="M7 11c0 2 3 2 3 0"></path>
            <path d="M8.5 11v10"></path>
            <path d="M17 3c-1.6 1.8-2.4 4-2.4 6.6V14h4.8V3"></path>
            <path d="M17 14v7"></path>
          </svg>
        </div>
        <div>
          <h1>小奕铭美食广场</h1>
          <p class="tagline">把想吃的小愿望排好队，吃到开心就给它打个分。</p>
        </div>
      </div>
      <div class="header-tools">
        <div class="stats" aria-label="清单统计">
          <div class="stat">
            <strong id="todoCount">0</strong>
            <span>待吃</span>
          </div>
          <div class="stat">
            <strong id="eatenCount">0</strong>
            <span>已吃</span>
          </div>
          <div class="stat">
            <strong id="avgRating">-</strong>
            <span>平均评分</span>
          </div>
        </div>
        <div class="sync-row">
          <div class="sync-status" id="syncStatus" aria-live="polite">
            <span class="sync-dot" id="syncDot"></span>
            <span id="syncText">本地模式</span>
          </div>
        </div>
      </div>
    </header>

    <section class="layout">
      <aside class="panel">
        <div class="section-title">
          <h2>新增小吃摊</h2>
        </div>
        <div class="ocr-box">
          <h3>截图识别</h3>
          <div class="ocr-actions">
            <label class="file-picker" for="ocrInput">
              上传团购截图
              <input id="ocrInput" type="file" accept="image/*">
            </label>
            <button class="btn" id="ocrButton" type="button" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M4 7V5a1 1 0 0 1 1-1h2"></path>
                <path d="M17 4h2a1 1 0 0 1 1 1v2"></path>
                <path d="M20 17v2a1 1 0 0 1-1 1h-2"></path>
                <path d="M7 20H5a1 1 0 0 1-1-1v-2"></path>
                <path d="M8 12h8"></path>
                <path d="M8 16h5"></path>
              </svg>
              识别
            </button>
          </div>
          <img class="ocr-preview" id="ocrPreview" alt="团购截图预览">
          <div class="ocr-status" id="ocrStatus" aria-live="polite">上传截图后，可以自动填入名称和地点。</div>
        </div>
        <form id="addForm">
          <div class="field">
            <label for="foodName">美食名称</label>
            <input id="foodName" name="foodName" autocomplete="off" maxlength="40" placeholder="例如：牛肉火锅" required>
          </div>
          <div class="field">
            <label for="foodPlace">店铺或地点</label>
            <input id="foodPlace" name="foodPlace" autocomplete="off" maxlength="50" placeholder="例如：公司附近">
          </div>
          <div class="field">
            <label for="foodNote">备注</label>
            <textarea id="foodNote" name="foodNote" maxlength="180" placeholder="口味、推荐菜、同行的人都可以写在这里"></textarea>
          </div>
          <button class="btn full" type="submit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M12 5v14"></path>
              <path d="M5 12h14"></path>
            </svg>
            加入美食广场
          </button>
        </form>
      </aside>

      <section class="list-panel">
        <div class="list-head">
          <div class="section-title">
            <h2 id="listTitle">待吃小摊</h2>
          </div>
          <div class="tabs" aria-label="切换清单">
            <button class="tab active" type="button" data-view="todo">待吃</button>
            <button class="tab" type="button" data-view="eaten">已吃</button>
          </div>
          <input class="search" id="searchInput" autocomplete="off" placeholder="搜索美食或地点">
        </div>
        <div class="items" id="items"></div>
      </section>
    </section>
  </main>

  <template id="emptyTemplate">
    <div class="empty">
      <div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M4 10h16"></path>
          <path d="M5 10l1.6 9h10.8L19 10"></path>
          <path d="M8 10c0-3 1.4-5 4-5s4 2 4 5"></path>
        </svg>
        <strong></strong>
        <span></span>
      </div>
    </div>
  </template>

  <script type="module">
    const STORAGE_KEY = "toEatFoods.v1";
    const SUPABASE_URL = "https://ttsfoelvnebuonvpzizl.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0c2ZvZWx2bmVidW9udnB6aXpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNDEzMzEsImV4cCI6MjA5NDcxNzMzMX0.W91PXbz4hoRqvCb_U57txqUaXaFj7rZ1sY9zhPdHN0I";

    let supabase = null;
    let realtimeChannel = null;
    let cloudReady = false;

    const state = {
      view: "todo",
      search: "",
      foods: loadInitialFoods()
    };

    const addForm = document.querySelector("#addForm");
    const foodNameInput = document.querySelector("#foodName");
    const foodPlaceInput = document.querySelector("#foodPlace");
    const items = document.querySelector("#items");
    const tabs = document.querySelectorAll(".tab");
    const listTitle = document.querySelector("#listTitle");
    const searchInput = document.querySelector("#searchInput");
    const todoCount = document.querySelector("#todoCount");
    const eatenCount = document.querySelector("#eatenCount");
    const avgRating = document.querySelector("#avgRating");
    const syncStatus = document.querySelector("#syncStatus");
    const syncDot = document.querySelector("#syncDot");
    const syncText = document.querySelector("#syncText");
    const ocrInput = document.querySelector("#ocrInput");
    const ocrButton = document.querySelector("#ocrButton");
    const ocrPreview = document.querySelector("#ocrPreview");
    const ocrStatus = document.querySelector("#ocrStatus");

    let ocrFile = null;

    addForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const formData = new FormData(addForm);
      const name = String(formData.get("foodName") || "").trim();

      if (!name) return;

      const newFood = {
        id: crypto.randomUUID(),
        name,
        place: String(formData.get("foodPlace") || "").trim(),
        note: String(formData.get("foodNote") || "").trim(),
        status: "todo",
        createdAt: new Date().toISOString(),
        eatenDate: "",
        rating: ""
      };

      addForm.reset();
      await addFood(newFood);
    });

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        state.view = tab.dataset.view;
        render();
      });
    });

    searchInput.addEventListener("input", () => {
      state.search = searchInput.value.trim().toLowerCase();
      renderItems();
    });

    ocrInput.addEventListener("change", () => {
      const [file] = ocrInput.files || [];
      ocrFile = file || null;
      ocrButton.disabled = !ocrFile;

      if (!ocrFile) {
        ocrPreview.classList.remove("show");
        ocrPreview.removeAttribute("src");
        setOcrStatus("上传截图后，可以自动填入名称和地点。");
        return;
      }

      ocrPreview.src = URL.createObjectURL(ocrFile);
      ocrPreview.classList.add("show");
      setOcrStatus("截图已选好，点击识别。");
    });

    ocrButton.addEventListener("click", async () => {
      if (!ocrFile) return;

      ocrButton.disabled = true;
      setOcrStatus("正在识别截图，第一次会稍慢一点...");

      try {
        const text = await recognizeImageText(ocrFile);
        const result = extractFoodInfo(text);

        if (result.name) foodNameInput.value = result.name;
        if (result.place) foodPlaceInput.value = result.place;

        if (result.name || result.place) {
          setOcrStatus(`已识别：${result.name || "名称待补"} / ${result.place || "地点待补"}`);
        } else {
          setOcrStatus("识别完成，但没找到明显的名称或地址，可以换一张更清晰的截图。");
        }
      } catch (error) {
        console.error(error);
        setOcrStatus("识别失败，请检查网络后重试，或手动填写。");
      } finally {
        ocrButton.disabled = false;
      }
    });

    items.addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (!button) return;

      const card = button.closest(".food-card");
      const food = state.foods.find((item) => item.id === card?.dataset.id);
      if (!food) return;

      if (button.dataset.action === "openEat") {
        card.classList.toggle("open");
      }

      if (button.dataset.action === "delete") {
        deleteFood(food.id);
      }
    });

    items.addEventListener("submit", async (event) => {
      event.preventDefault();
      const form = event.target;
      const card = form.closest(".food-card");
      const food = state.foods.find((item) => item.id === card?.dataset.id);
      if (!food) return;

      const formData = new FormData(form);
      await markFoodEaten(food.id, {
        status: "eaten",
        eatenDate: String(formData.get("eatenDate") || ""),
        rating: Number(formData.get("rating") || 0)
      });
    });

    function loadFoods() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function loadInitialFoods() {
      return loadFoods();
    }

    function saveFoods() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.foods));
    }

    async function initCloudSync() {
      if (!hasSupabaseConfig()) {
        setSyncStatus("local", "本地模式：填入 Supabase 配置后可云同步");
        return;
      }

      try {
        const { createClient } = await import("https://esm.sh/@supabase/supabase-js@2");
        supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        cloudReady = true;
        setSyncStatus("cloud", "云同步连接中...");
        await loadCloudFoods();
        subscribeToCloudChanges();
        setSyncStatus("cloud", "云同步已开启");
      } catch (error) {
        cloudReady = false;
        setSyncStatus("error", "云同步暂不可用，已切回本地模式");
        console.error(error);
      }
    }

    function hasSupabaseConfig() {
      return SUPABASE_URL.startsWith("https://") && SUPABASE_ANON_KEY.length > 20;
    }

    async function loadCloudFoods() {
      if (!cloudReady) return;
      const { data, error } = await supabase
        .from("foods")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) throw error;
      state.foods = data.map(fromCloudFood);
      saveFoods();
      render();
    }

    function subscribeToCloudChanges() {
      if (!cloudReady || realtimeChannel) return;

      realtimeChannel = supabase
        .channel("foods-live")
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "foods" },
          () => loadCloudFoods()
        )
        .subscribe();
    }

    async function addFood(food) {
      if (!cloudReady) {
        state.foods.unshift(food);
        saveFoods();
        render();
        return;
      }

      const { data, error } = await supabase
        .from("foods")
        .insert(toCloudFood(food))
        .select()
        .single();

      if (error) {
        state.foods.unshift(food);
        saveFoods();
        render();
        setSyncStatus("error", "新增未同步到云端，请检查 Supabase 表设置");
        return;
      }

      state.foods.unshift(fromCloudFood(data));
      saveFoods();
      render();
    }

    async function deleteFood(id) {
      const previousFoods = [...state.foods];
      state.foods = state.foods.filter((item) => item.id !== id);
      saveFoods();
      render();

      if (!cloudReady) return;

      const { error } = await supabase
        .from("foods")
        .delete()
        .eq("id", id);

      if (error) {
        state.foods = previousFoods;
        saveFoods();
        render();
        setSyncStatus("error", "删除未同步到云端，请稍后再试");
      }
    }

    async function markFoodEaten(id, updates) {
      const food = state.foods.find((item) => item.id === id);
      if (!food) return;

      Object.assign(food, updates);
      saveFoods();
      state.view = "eaten";
      render();

      if (!cloudReady) return;

      const { error } = await supabase
        .from("foods")
        .update({
          status: updates.status,
          eaten_date: updates.eatenDate || null,
          rating: updates.rating || null
        })
        .eq("id", id);

      if (error) {
        setSyncStatus("error", "已吃记录未同步到云端，请稍后再试");
      }
    }

    function toCloudFood(food) {
      return {
        id: food.id,
        name: food.name,
        place: food.place || null,
        note: food.note || null,
        status: food.status,
        created_at: food.createdAt,
        eaten_date: food.eatenDate || null,
        rating: food.rating || null
      };
    }

    function fromCloudFood(food) {
      return {
        id: food.id,
        name: food.name,
        place: food.place || "",
        note: food.note || "",
        status: food.status || "todo",
        createdAt: food.created_at || new Date().toISOString(),
        eatenDate: food.eaten_date || "",
        rating: food.rating || ""
      };
    }

    function setSyncStatus(type, message) {
      syncText.textContent = message;
      syncDot.classList.toggle("cloud", type === "cloud");
      syncDot.classList.toggle("error", type === "error");
    }

    async function recognizeImageText(file) {
      const { createWorker } = await import("https://cdn.jsdelivr.net/npm/tesseract.js@5/+esm");
      const worker = await createWorker("chi_sim+eng");

      try {
        const {
          data: { text }
        } = await worker.recognize(file);
        return text || "";
      } finally {
        await worker.terminate();
      }
    }

    function extractFoodInfo(text) {
      const lines = text
        .split(/\r?\n/)
        .map((line) => line.replace(/\s+/g, " ").trim())
        .filter(Boolean);

      return {
        name: findFoodName(lines),
        place: findAddress(lines)
      };
    }

    function findFoodName(lines) {
      const foodWords = /餐|套餐|双人|单人|火锅|烧烤|烤肉|自助|炒菜|小吃|牛|羊|猪|鸡|鸭|鱼|虾|蟹|肉|饭|面|粉|米线|汉堡|披萨|寿司|甜品|蛋糕|奶茶|咖啡|饮品|串|锅|煲|粥|饺|包|店/;
      const candidates = lines
        .filter((line) => isUsefulLine(line) && !looksLikeAddress(line))
        .map((line) => cleanNameLine(line))
        .filter((line) => line.length >= 2 && line.length <= 40);

      const foodCandidate = candidates.find((line) => foodWords.test(line));
      if (foodCandidate) return foodCandidate;

      return candidates
        .sort((a, b) => scoreNameLine(b) - scoreNameLine(a))[0] || "";
    }

    function findAddress(lines) {
      const addressLabel = /(地址|位置|门店地址|商家地址|到店|导航|营业地址|详细地址)[:：]?\s*(.+)?/;
      for (const line of lines) {
        const match = line.match(addressLabel);
        if (match) {
          const value = cleanAddressLine(match[2] || line.replace(addressLabel, ""));
          if (value.length >= 4) return value;
        }
      }

      const addressCandidate = lines
        .filter((line) => isUsefulLine(line) && looksLikeAddress(line))
        .map(cleanAddressLine)
        .find((line) => line.length >= 4 && line.length <= 70);

      return addressCandidate || "";
    }

    function isUsefulLine(line) {
      if (!line || line.length < 2) return false;
      if (/^[\d\s.,:：\-￥¥/]+$/.test(line)) return false;
      if (/券|优惠|须知|有效期|购买|退款|销量|已售|评分|营业时间|电话|预约|二维码|订单|原价|现价|¥|￥/.test(line)) return false;
      return true;
    }

    function looksLikeAddress(line) {
      return /省|市|区|县|镇|乡|村|路|街|巷|弄|号|楼|层|座|栋|广场|商场|中心|大厦|门店|附近|地铁|公交/.test(line);
    }

    function cleanNameLine(line) {
      return line
        .replace(/^(团购|套餐|美团|大众点评|抖音|商家|门店)[:：\s-]*/g, "")
        .replace(/[|｜·•]+/g, " ")
        .trim();
    }

    function cleanAddressLine(line) {
      return line
        .replace(/^(地址|位置|门店地址|商家地址|到店|导航|营业地址|详细地址)[:：\s-]*/g, "")
        .replace(/(复制|查看地图|导航|详情)$/g, "")
        .trim();
    }

    function scoreNameLine(line) {
      let score = Math.min(line.length, 24);
      if (/餐|套餐|锅|肉|饭|面|粉|甜品|奶茶|咖啡|店/.test(line)) score += 10;
      if (/^\d/.test(line)) score -= 8;
      return score;
    }

    function setOcrStatus(message) {
      ocrStatus.textContent = message;
    }

    function render() {
      tabs.forEach((tab) => {
        tab.classList.toggle("active", tab.dataset.view === state.view);
      });
      listTitle.textContent = state.view === "todo" ? "待吃小摊" : "已吃回忆";
      renderStats();
      renderItems();
    }

    function renderStats() {
      const todoFoods = state.foods.filter((food) => food.status === "todo");
      const eatenFoods = state.foods.filter((food) => food.status === "eaten");
      const ratings = eatenFoods.map((food) => Number(food.rating)).filter(Boolean);
      const average = ratings.length
        ? (ratings.reduce((sum, item) => sum + item, 0) / ratings.length).toFixed(1)
        : "-";

      todoCount.textContent = todoFoods.length;
      eatenCount.textContent = eatenFoods.length;
      avgRating.textContent = average;
    }

    function renderItems() {
      const filtered = state.foods
        .filter((food) => food.status === state.view)
        .filter((food) => {
          const target = `${food.name} ${food.place} ${food.note}`.toLowerCase();
          return target.includes(state.search);
        });

      items.innerHTML = "";

      if (!filtered.length) {
        items.appendChild(createEmpty());
        return;
      }

      filtered.forEach((food) => {
        items.appendChild(createFoodCard(food));
      });
    }

    function createFoodCard(food) {
      const card = document.createElement("article");
      card.className = `food-card ${food.status === "eaten" ? "eaten" : ""}`;
      card.dataset.id = food.id;

      const meta = [
        food.place ? `地点：${escapeHtml(food.place)}` : "",
        food.status === "eaten" && food.eatenDate ? `日期：${formatDate(food.eatenDate)}` : "",
        food.status === "eaten" && food.rating ? `评分：<span class="rating">${food.rating}/5</span>` : ""
      ].filter(Boolean).map((item) => `<span>${item}</span>`).join("");

      card.innerHTML = `
        <div class="food-main">
          <div class="food-title">
            <h3>${escapeHtml(food.name)}</h3>
            <span class="chip ${food.status === "eaten" ? "eaten" : ""}">${food.status === "eaten" ? "已吃" : "待吃"}</span>
          </div>
          <div class="meta">${meta || "还没有补充地点"}</div>
          ${food.note ? `<p class="note">${escapeHtml(food.note)}</p>` : ""}
        </div>
        <div class="actions">
          ${food.status === "todo" ? `
            <button class="icon-btn" type="button" data-action="openEat" title="标记为已吃" aria-label="标记为已吃">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M20 6 9 17l-5-5"></path>
              </svg>
            </button>
          ` : ""}
          <button class="icon-btn" type="button" data-action="delete" title="删除" aria-label="删除">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M3 6h18"></path>
              <path d="M8 6V4h8v2"></path>
              <path d="M19 6l-1 14H6L5 6"></path>
            </svg>
          </button>
        </div>
        ${food.status === "todo" ? createEatForm() : ""}
      `;

      const dateInput = card.querySelector('input[name="eatenDate"]');
      if (dateInput) dateInput.valueAsDate = new Date();

      return card;
    }

    function createEatForm() {
      return `
        <form class="eat-form">
          <div class="field">
            <label>吃过日期</label>
            <input type="date" name="eatenDate" required>
          </div>
          <div class="field">
            <label>评分</label>
            <select name="rating" required>
              <option value="5">5 分</option>
              <option value="4">4 分</option>
              <option value="3">3 分</option>
              <option value="2">2 分</option>
              <option value="1">1 分</option>
            </select>
          </div>
          <button class="btn" type="submit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M20 6 9 17l-5-5"></path>
            </svg>
            收进回忆
          </button>
        </form>
      `;
    }

    function createEmpty() {
      const template = document.querySelector("#emptyTemplate").content.cloneNode(true);
      const title = template.querySelector("strong");
      const text = template.querySelector("span");
      const searching = Boolean(state.search);

      title.textContent = searching
        ? "没有找到匹配项"
        : state.view === "todo" ? "美食广场还空着" : "还没有已吃回忆";
      text.textContent = searching
        ? "换个关键词试试。"
        : state.view === "todo" ? "从左侧添加一个想吃的小摊。" : "把待吃小摊标记为已吃后会出现在这里。";

      return template;
    }

    function formatDate(value) {
      if (!value) return "";
      const [year, month, day] = value.split("-");
      return `${year}.${month}.${day}`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    render();
    initCloudSync();
  </script>
</body>
</html>
